<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CancelShield Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f3efe3;
        --ink: #1d2a35;
        --ink-soft: #586570;
        --brand: #0f7c78;
        --accent: #d45a2d;
        --card: #fffaf1;
        --line: #d6c7ac;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "PingFang SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 20%, #f8dcb4 0, transparent 32%),
          radial-gradient(circle at 88% 4%, #c5e5dd 0, transparent 30%),
          var(--bg);
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 26px 20px 48px;
      }

      .hero {
        border: 1px solid var(--line);
        background: linear-gradient(120deg, #fffaf2, #f3f0e7 55%, #eff7f5);
        border-radius: 22px;
        padding: 24px;
        box-shadow: 0 16px 50px rgba(14, 28, 32, 0.09);
      }

      .hero h1 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 8px 0 0;
        color: var(--ink-soft);
      }

      .grid {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 14px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-6 {
        grid-column: span 6;
      }

      .span-8 {
        grid-column: span 8;
      }

      .span-12 {
        grid-column: span 12;
      }

      label {
        display: block;
        margin: 10px 0 6px;
        font-size: 0.82rem;
        color: var(--ink-soft);
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 76px;
        resize: vertical;
      }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-main {
        background: var(--brand);
        color: #fff;
      }

      .btn-sub {
        background: #e8ddd1;
        color: var(--ink);
      }

      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: #e5f1ed;
        color: #0a5a56;
        font-size: 0.75rem;
      }

      .status {
        margin-top: 10px;
        min-height: 24px;
        color: #115c58;
        font-size: 0.9rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        border-bottom: 1px dashed var(--line);
        padding: 10px 8px;
        font-size: 0.9rem;
      }

      th {
        color: var(--ink-soft);
        font-size: 0.8rem;
      }

      .row-actions button {
        margin: 0 6px 6px 0;
        padding: 6px 10px;
        border-radius: 8px;
        background: #f5ebdc;
      }

      @media (max-width: 980px) {
        .span-4,
        .span-6,
        .span-8,
        .span-12 {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>CancelShield Console</h1>
        <p>团队级试用订阅风控台：提醒、留证、导出，一套流程闭环。</p>
      </section>

      <section class="grid">
        <article class="panel span-4">
          <h2>1) 初始化团队</h2>
          <label for="team-name">团队名称</label>
          <input id="team-name" placeholder="例如：Growth Lab" />
          <label for="team-owner-email">管理员邮箱</label>
          <input id="team-owner-email" placeholder="admin@company.com" />
          <button class="btn-main" id="bootstrap-btn">创建团队并生成 Admin Key</button>
          <div class="status" id="bootstrap-status"></div>

          <h2 style="margin-top: 22px">2) API Key</h2>
          <label for="api-key">X-API-Key</label>
          <input id="api-key" placeholder="cs_live_xxx" />
          <button class="btn-sub" id="save-key-btn">保存 Key</button>
          <button class="btn-sub" id="load-team-btn">读取团队信息</button>
          <div class="status" id="team-status"></div>
        </article>

        <article class="panel span-8">
          <h2>新增订阅 <span class="tag">MVP</span></h2>
          <div class="grid" style="margin-top: 0">
            <div class="span-4">
              <label for="vendor">厂商</label>
              <input id="vendor" placeholder="Notion / Cursor / OpenAI" />
            </div>
            <div class="span-4">
              <label for="plan-name">计划名</label>
              <input id="plan-name" placeholder="Pro / Team" />
            </div>
            <div class="span-4">
              <label for="owner-email">负责人邮箱</label>
              <input id="owner-email" placeholder="owner@company.com" />
            </div>
            <div class="span-4">
              <label for="amount">金额</label>
              <input id="amount" type="number" placeholder="29" />
            </div>
            <div class="span-4">
              <label for="currency">币种</label>
              <input id="currency" value="USD" />
            </div>
            <div class="span-4">
              <label for="renewal-date">续费日期</label>
              <input id="renewal-date" type="date" />
            </div>
          </div>
          <label for="notes">备注</label>
          <textarea id="notes" placeholder="账号入口、取消路径、删卡入口等"></textarea>
          <button class="btn-main" id="create-sub-btn">创建订阅</button>
          <button class="btn-sub" id="run-reminders-btn">执行今日提醒任务</button>
          <div class="status" id="subscription-status"></div>
        </article>

        <article class="panel span-6">
          <h2>成员与角色</h2>
          <label for="member-email">成员邮箱</label>
          <input id="member-email" placeholder="teammate@company.com" />
          <label for="member-role">角色</label>
          <select id="member-role">
            <option value="viewer">viewer</option>
            <option value="editor" selected>editor</option>
            <option value="admin">admin</option>
          </select>
          <button class="btn-main" id="add-member-btn">添加成员</button>
          <button class="btn-sub" id="refresh-members-btn">刷新成员</button>

          <label for="key-label">新API Key标签</label>
          <input id="key-label" placeholder="ops-bot-key" />
          <label for="key-role">Key角色</label>
          <select id="key-role">
            <option value="viewer">viewer</option>
            <option value="editor" selected>editor</option>
            <option value="admin">admin</option>
          </select>
          <label for="key-created-by">创建人邮箱(可选)</label>
          <input id="key-created-by" placeholder="admin@company.com" />
          <button class="btn-sub" id="create-key-btn">创建API Key</button>
          <div class="status" id="member-status"></div>

          <div style="overflow-x: auto; margin-top: 8px">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Email</th>
                  <th>Role</th>
                </tr>
              </thead>
              <tbody id="member-rows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel span-6">
          <h2>通知通道</h2>
          <label for="notify-provider">Provider</label>
          <select id="notify-provider">
            <option value="feishu">feishu</option>
            <option value="slack">slack</option>
            <option value="generic">generic</option>
          </select>
          <label for="notify-webhook">Webhook URL</label>
          <input id="notify-webhook" placeholder="https://..." />
          <label style="display:flex;align-items:center;gap:8px;margin-top:12px;">
            <input id="notify-enabled" type="checkbox" checked style="width:auto;" />启用
          </label>
          <button class="btn-main" id="save-channel-btn">保存通道</button>
          <button class="btn-sub" id="load-channel-btn">查看通道</button>
          <button class="btn-sub" id="test-channel-btn">发送测试消息</button>
          <div class="status" id="notify-status"></div>
        </article>

        <article class="panel span-12">
          <h2>订阅列表</h2>
          <button class="btn-sub" id="refresh-btn">刷新列表</button>
          <input id="evidence-file" type="file" hidden />
          <div class="status" id="list-status"></div>
          <div style="overflow-x: auto">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>厂商</th>
                  <th>计划</th>
                  <th>金额</th>
                  <th>续费日</th>
                  <th>负责人</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="subscription-rows"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
    <script src="/console/app.js"></script>
  </body>
</html>
